# Generated by Delta project init.
# Edit this project-local file to scope profile access.
# .deltaignore always wins over permissions and shareables.
# Team mode routes each turn to selected profiles. Non-lead team profiles without an explicit
# permissions block below are default-denied for project files, network, planning, and reporting.
conflict_policy:
  strategy: manager_review
  manager_profile: delta
shareables:
  paths: []
  topics: []
profiles:
  delta:
    paths: ["**"]
    edit_paths: ["**"]
    network: true
    shell: true
    planning: true
    managing: true
    critique: true
    see_others_work: true
    can_edit: true
    report_targets: ["user"]
    can_modify_work_of: ["delta"]

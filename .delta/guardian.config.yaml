limits:
  max_nesting: 3
  cyclomatic_complexity_warn: 6
  cyclomatic_complexity_error: 8
  max_imports: 15
  max_functions_per_file: 16
  max_function_lines: 80
  max_function_arguments: 3
  max_type_fields: 12
  max_hidden_touch_excess: 2
  max_lifecycle_flags: 2
  max_line_length: 120
  max_excerpt_lines: 12
  max_excerpt_chars: 1600
scan:
  extensions: [".go", ".ts", ".tsx", ".py", ".rs", ".zig"]
  ignored_dirs: [".git", ".zig-cache", "zig-out", "node_modules", "vendor", "dist", "build", "__pycache__"]
go:
  ban_interface_empty: true
  ban_map_string_interface_empty: true
  warn_type_switch: true
  ban_unchecked_type_assertions: true
  ban_generics: true
  surface_scope: "public_only"
  generic_scope: "public_only"
  extra_banned_patterns: []
typescript:
  ban_any: true
  ban_as_any: true
  ban_ts_ignore: true
  warn_ts_expect_error: true
  extra_banned_patterns: []
python:
  ban_type_ignore: true
  warn_import_any: true
  ban_any_annotation: true
  warn_bare_dict: true
  warn_bare_list: true
  warn_missing_return_annotation: true
  extra_banned_patterns: []
zig:
  warn_ptr_cast: true
  warn_int_cast: true
  warn_anytype: true
  anytype_scope: "public_only"
  cast_scope: "public_only"
  extra_banned_patterns: []
overrides:
  - path_prefixes: ["src/analyzers/", "src/protocol/"]
    limits:
      max_functions_per_file: 30
      max_function_lines: 120
      max_function_arguments: 8
      max_line_length: 160
      cyclomatic_complexity_warn: 10
      cyclomatic_complexity_error: 14
  - path_suffixes: ["src/types.zig"]
    limits:
      max_functions_per_file: 48
      max_nesting: 5
      max_function_lines: 240
      max_type_fields: 16
      cyclomatic_complexity_warn: 32
      cyclomatic_complexity_error: 48
      max_function_arguments: 8
      max_line_length: 160
  - path_suffixes: ["src/analyzers/complexity.zig"]
    limits:
      max_functions_per_file: 36
  - path_suffixes: ["src/analyzers/type_check.zig"]
    limits:
      max_functions_per_file: 60
  - path_suffixes: ["src/config.zig"]
    limits:
      max_functions_per_file: 30
      max_function_arguments: 8
      cyclomatic_complexity_warn: 8
      cyclomatic_complexity_error: 12
      max_nesting: 4
  - path_suffixes: ["src/config_schema.zig"]
    limits:
      max_function_arguments: 6
      max_type_fields: 16
      max_hidden_touch_excess: 4
  - path_suffixes: ["src/symbol_model.zig"]
    limits:
      max_functions_per_file: 150
      max_function_arguments: 10
      max_type_fields: 16
      max_hidden_touch_excess: 12
      max_nesting: 6
      cyclomatic_complexity_warn: 10
      cyclomatic_complexity_error: 14
      max_line_length: 160
  - path_suffixes: ["src/config_loader.zig"]
    limits:
      max_functions_per_file: 28
  - path_suffixes: ["src/cli.zig", "src/analyzer.zig", "src/app.zig", "src/source_files.zig", "src/reporting.zig"]
    limits:
      max_function_arguments: 6
      max_functions_per_file: 32
  - path_suffixes: ["src/root.zig", "src/yaml_config.zig"]
    limits:
      max_function_arguments: 8
      max_functions_per_file: 48
      cyclomatic_complexity_warn: 12
      cyclomatic_complexity_error: 16
      max_line_length: 160
  - roles: ["test", "fixture", "sample"]
    limits:
      max_function_lines: 90
      max_line_length: 160
    go:
      ban_generics: false
    zig:
      warn_anytype: false
